  <rect x="30" y="20" width="18" height="80" rx="4" fill="#1e66f5"/>
  <rect x="54" y="20" width="18" height="80" rx="4" fill="#40a02b"/>
  <rect x="78" y="20" width="18" height="80" rx="4" fill="#df8e1d"/>
  <rect x="102" y="20" width="18" height="80" rx="4" fill="#d20f39"/>
